appId: com.thieule.lolvodreview
productName: LoL VOD Review
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/*.node"
mac:
  category: public.app-category.video
  target:
    - dmg
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
# Auto-update feed. electron-updater pulls release artifacts (+ latest.yml) from
# the public GitHub repo, so installed builds update themselves with no git pull.
publish:
  provider: github
  owner: thieu-le
  repo: lol-vod-review
  # Publish releases directly (not as a draft) so the installer is downloadable
  # and the auto-updater can find it the moment CI finishes.
  releaseType: release
